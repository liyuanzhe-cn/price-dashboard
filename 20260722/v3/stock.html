<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票500强</title>
<style>
  :root{
    --bg:#0a0e12; --panel:#12171d; --line:#1f2830; --text:#dfe6ec; --dim:#7b8794;
    --amber:#d4a537; --up:#3fb950; --down:#f85149;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
    --sans: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  *{box-sizing:border-box;}
  .page{max-width:1600px; margin:0 auto;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:var(--sans); padding:20px 16px 60px;}
  h1{font-family:var(--mono); font-size:16px; font-weight:600; letter-spacing:.08em;
     text-transform:uppercase; color:var(--amber); margin:0 0 4px;}
  .meta{font-family:var(--mono); font-size:11px; color:var(--dim); margin-bottom:16px;}
  .filter-bar{margin-bottom:12px; display:flex; gap:8px; align-items:center;}
  .filter-bar{flex-wrap:wrap;}
  .filter-bar input, .multi-select-btn{
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-family:var(--mono); font-size:13px; padding:6px 10px; border-radius:4px; width:240px;
  }
  .multi-select{position:relative; min-width:180px;}
  .multi-select-btn{width:100%; min-width:180px; text-align:left; cursor:pointer; display:flex; justify-content:space-between; gap:10px;}
  .multi-select-btn::after{content:'▾'; color:var(--dim);}
  .multi-select.open .multi-select-btn{border-color:var(--amber);}
  .multi-select-menu{display:none; position:absolute; left:0; top:calc(100% + 5px); z-index:20; min-width:260px;
    max-width:380px; max-height:320px; overflow:auto; padding:6px; background:#20252c;
    border:1px solid #46505b; border-radius:6px; box-shadow:0 10px 28px rgba(0,0,0,.45);}
  .multi-select.open .multi-select-menu{display:block;}
  .multi-actions{display:flex; gap:6px; padding:3px 4px 7px; border-bottom:1px solid var(--line); margin-bottom:4px; position:sticky; top:0; background:#20252c;}
  .multi-actions button{background:transparent; color:var(--amber); border:1px solid var(--line); border-radius:3px; cursor:pointer; padding:3px 8px;}
  .multi-option{display:flex; align-items:center; gap:8px; padding:6px 7px; cursor:pointer; border-radius:3px; white-space:nowrap;}
  .multi-option:hover{background:#2b323a;}
  .multi-option input{width:auto; margin:0; accent-color:var(--amber);}
  .table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:6px;}
  table{border-collapse:collapse; width:100%; font-family:var(--mono); font-size:12px; white-space:nowrap;}
  th, td{padding:7px 10px; text-align:right; border-bottom:1px solid var(--line);}
  th:first-child, td:first-child{text-align:left; position:sticky; left:0; background:var(--panel); z-index:1;}
  thead th{
    background:#161c24; color:var(--dim); cursor:pointer; user-select:none;
    position:sticky; top:0; z-index:2; font-weight:600; white-space:nowrap;
  }
  thead th:first-child{z-index:3;}
  thead th:hover{color:var(--amber);}
  thead th.sorted-asc::after{content:' ▲'; color:var(--amber);}
  thead th.sorted-desc::after{content:' ▼'; color:var(--amber);}
  tbody tr:hover{background:#161c24;}
  .up{color:var(--up);} .down{color:var(--down);} .dim{color:var(--dim);}
  a.sym-link{color:var(--text); text-decoration:none; font-weight:600;}
  a.sym-link:hover{color:var(--amber);}
  .name-sub{color:var(--dim); font-size:10px; display:block;}
  .errbox{margin-top:16px; font-family:var(--mono); font-size:11px; color:var(--down); white-space:pre-wrap;}
  .back-link{font-family:var(--mono); font-size:11px; color:var(--dim); text-decoration:none;}
  .back-link:hover{color:var(--amber);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="page">

<a class="back-link" href="/">← 返回主看板</a>
<h1 style="margin-top:10px;">股票500强</h1>
<div class="meta">数据来自stockanalysis.com(名单/市值/现价) + 雅虎财经(估值/基本面/ATH) · 独立脚本每日更新一次,不是实时数据 · 生成时间: <b id="generatedAt">--</b> · 点击表头排序</div>

<div class="filter-bar">
  <input type="text" id="filterInput" placeholder="按代码或中英文公司名筛选...">
  <div class="multi-select" id="sectorFilter"><button type="button" class="multi-select-btn">全部板块</button><div class="multi-select-menu"></div></div>
  <div class="multi-select" id="industryFilter"><button type="button" class="multi-select-btn">全部细分行业</button><div class="multi-select-menu"></div></div>
  <span class="meta" id="rowCount"></span>
  <button onclick="exportBrowserScreenshot()" style="font-family:var(--mono); font-size:12px; background:var(--panel); color:var(--amber); border:1px solid var(--amber); border-radius:4px; padding:6px 12px; cursor:pointer;">截图导出 ⬇</button>
  <button onclick="downloadJSON()" style="font-family:var(--mono); font-size:12px; background:var(--panel); color:var(--dim); border:1px solid var(--line); border-radius:4px; padding:6px 12px; cursor:pointer;">下载JSON</button>
  <button onclick="downloadCSV()" style="font-family:var(--mono); font-size:12px; background:var(--panel); color:var(--dim); border:1px solid var(--line); border-radius:4px; padding:6px 12px; cursor:pointer;">下载CSV</button>
</div>

<div class="table-wrap">
  <table id="stockTable">
    <thead>
      <tr>
        <th data-key="name" data-type="string" style="text-align:left;">股票名</th>
        <th data-key="sector_cn" data-type="string">板块</th>
        <th data-key="industry_cn" data-type="string">细分行业</th>
        <th data-key="market_cap" data-type="number">市值</th>
        <th data-key="price" data-type="number">现价</th>
        <th data-key="ath" data-type="number">ATH</th>
        <th data-key="ath_date" data-type="string">ATH时间</th>
        <th data-key="ath_drawdown_pct" data-type="number">距ATH深度</th>
        <th data-key="pe_ratio" data-type="number">市盈率</th>
        <th data-key="pb_ratio" data-type="number">市净率</th>
        <th data-key="ps_ratio" data-type="number">市销率</th>
        <th data-key="beta" data-type="number">BETA系数</th>
        <th data-key="free_cash_flow" data-type="number">自由现金流</th>
        <th data-key="roe" data-type="number">ROE</th>
        <th data-key="shares_outstanding" data-type="number">股份数</th>
        <th data-key="debt_to_equity" data-type="number">负债/权益</th>
        <th data-key="change_pct" data-type="number">24h涨跌</th>
        <th data-key="revenue" data-type="number">营收</th>
        <th data-key="dividend_yield_pct" data-type="number">Dividend</th>
        <th data-key="ipo_date" data-type="string">IPO日期</th>
        <th data-key="ipo_price" data-type="number">IPO价格</th>
        <th data-key="ipo_cagr_pct" data-type="number">IPO至今年化涨幅</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="errbox" id="errbox"></div>

</div><!-- /.page -->

<script>
let allStocks = [];
let currentSort = {key: 'market_cap', dir: 'desc'};
const selectedSectors = new Set();
const selectedIndustries = new Set();

function fmtMoney(v){
  if(v===null||v===undefined) return '--';
  const abs = Math.abs(v);
  if(abs >= 1e12) return '$'+(v/1e12).toFixed(2)+'T';
  if(abs >= 1e9) return '$'+(v/1e9).toFixed(2)+'B';
  if(abs >= 1e6) return '$'+(v/1e6).toFixed(2)+'M';
  return '$'+v.toFixed(2);
}
function fmtShares(v){
  if(v===null||v===undefined) return '--';
  const abs = Math.abs(v);
  if(abs >= 1e9) return (v/1e9).toFixed(2)+'B';
  if(abs >= 1e6) return (v/1e6).toFixed(2)+'M';
  return v.toLocaleString();
}
function fmtNum(v, digits=2){
  if(v===null||v===undefined) return '--';
  return v.toFixed(digits);
}
function fmtPct(v){
  if(v===null||v===undefined) return '--';
  return (v>=0?'+':'')+v.toFixed(2)+'%';
}
function pctClass(v){
  if(v===null||v===undefined) return '';
  return v>=0 ? 'up' : 'down';
}

function renderTable(){
  const filterText = document.getElementById('filterInput').value.trim().toLowerCase();
  let rows = allStocks;
  if(filterText){
    rows = rows.filter(s => [s.symbol,s.name,s.chinese_name,s.sector_cn,s.industry_cn]
      .some(v => (v||'').toLowerCase().includes(filterText)));
  }
  if(selectedSectors.size) rows = rows.filter(s => selectedSectors.has(s.sector_cn||s.sector||''));
  if(selectedIndustries.size) rows = rows.filter(s => selectedIndustries.has(s.industry_cn||s.industry||''));

  const {key, dir} = currentSort;
  const th = document.querySelector(`th[data-key="${key}"]`);
  const type = th ? th.dataset.type : 'number';
  rows = rows.slice().sort((a,b)=>{
    let va = a[key], vb = b[key];
    if(va===null||va===undefined) va = type==='number' ? -Infinity : '';
    if(vb===null||vb===undefined) vb = type==='number' ? -Infinity : '';
    if(type==='string'){
      va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
      return dir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return dir==='asc' ? va - vb : vb - va;
  });

  document.getElementById('rowCount').textContent = `共${rows.length}行`;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = rows.map(s => `
    <tr>
      <td><a class="sym-link" href="https://stockanalysis.com/stocks/${(s.symbol||'').toLowerCase()}/" target="_blank">${s.symbol||'--'}</a><span class="name-sub">${s.chinese_name ? s.chinese_name+' · ' : ''}${s.name||''}</span></td>
      <td>${s.sector_cn||s.sector||'--'}</td>
      <td>${s.industry_cn||s.industry||'--'}</td>
      <td>${fmtMoney(s.market_cap)}</td>
      <td>${s.price!=null ? '$'+fmtNum(s.price) : '--'}</td>
      <td>${s.ath!=null ? '$'+fmtNum(s.ath) : '--'}</td>
      <td class="dim">${s.ath_date||'--'}</td>
      <td class="${pctClass(s.ath_drawdown_pct)}">${fmtPct(s.ath_drawdown_pct)}</td>
      <td>${fmtNum(s.pe_ratio)}</td>
      <td>${fmtNum(s.pb_ratio)}</td>
      <td>${fmtNum(s.ps_ratio)}</td>
      <td>${fmtNum(s.beta)}</td>
      <td title="${s.financial_currency && s.financial_currency!=='USD' ? '原始计价货币:'+s.financial_currency+',已按查询时汇率换算成美元' : ''}">${fmtMoney(s.free_cash_flow)}${s.financial_currency && s.financial_currency!=='USD' ? ' <span class="dim" style="font-size:9px;">('+s.financial_currency+'→USD)</span>' : ''}</td>
      <td>${s.roe!=null ? (s.roe*100).toFixed(2)+'%' : '--'}</td>
      <td>${fmtShares(s.shares_outstanding)}</td>
      <td>${fmtNum(s.debt_to_equity)}</td>
      <td class="${pctClass(s.change_pct)}">${fmtPct(s.change_pct)}</td>
      <td>${fmtMoney(s.revenue)}</td>
      <td title="雅虎财经dividendYield">${s.dividend_yield_pct!=null ? fmtNum(s.dividend_yield_pct,2)+'%' : '--'}</td>
      <td class="dim" title="基于yfinance全历史月线第一条记录近似,只能精确到月,不是准确的挂牌日">${s.ipo_date||'--'}</td>
      <td>${s.ipo_price!=null ? '$'+fmtNum(s.ipo_price) : '--'}</td>
      <td class="${pctClass(s.ipo_cagr_pct)}">${fmtPct(s.ipo_cagr_pct)}</td>
    </tr>
  `).join('');

  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.remove('sorted-asc','sorted-desc');
    if(th.dataset.key === currentSort.key){
      th.classList.add(currentSort.dir==='asc' ? 'sorted-asc' : 'sorted-desc');
    }
  });
}

document.querySelectorAll('thead th').forEach(th=>{
  th.addEventListener('click', ()=>{
    const key = th.dataset.key;
    if(currentSort.key === key){
      currentSort.dir = currentSort.dir==='asc' ? 'desc' : 'asc';
    } else {
      currentSort = {key, dir: 'desc'};
    }
    renderTable();
  });
});

document.getElementById('filterInput').addEventListener('input', renderTable);

function buildMultiSelect(id, values, selected, emptyLabel, onChange){
  const root = document.getElementById(id);
  const button = root.querySelector('.multi-select-btn');
  const menu = root.querySelector('.multi-select-menu');
  menu.innerHTML = '';
  const actions = document.createElement('div');
  actions.className = 'multi-actions';
  const selectAll = document.createElement('button');
  selectAll.type = 'button'; selectAll.textContent = '全选';
  const clear = document.createElement('button');
  clear.type = 'button'; clear.textContent = '清空';
  actions.append(selectAll, clear); menu.appendChild(actions);
  const sorted = values.filter(Boolean).sort((a,b)=>a.localeCompare(b,'zh-CN'));
  const refreshLabel = ()=>{ button.textContent = selected.size ? `已选${selected.size}项` : emptyLabel; };
  sorted.forEach(value=>{
    const label = document.createElement('label'); label.className = 'multi-option';
    const input = document.createElement('input'); input.type = 'checkbox'; input.checked = selected.has(value);
    const text = document.createElement('span'); text.textContent = value;
    input.addEventListener('change', ()=>{
      input.checked ? selected.add(value) : selected.delete(value);
      refreshLabel(); onChange();
    });
    label.append(input,text); menu.appendChild(label);
  });
  selectAll.onclick = ()=>{ sorted.forEach(v=>selected.add(v)); buildMultiSelect(id,sorted,selected,emptyLabel,onChange); onChange(); };
  clear.onclick = ()=>{ selected.clear(); buildMultiSelect(id,sorted,selected,emptyLabel,onChange); onChange(); };
  refreshLabel();
}
function updateIndustryOptions(){
  const source = selectedSectors.size
    ? allStocks.filter(s=>selectedSectors.has(s.sector_cn||s.sector||'')) : allStocks;
  const values = [...new Set(source.map(s=>s.industry_cn||s.industry).filter(Boolean))];
  const valid = new Set(values);
  [...selectedIndustries].forEach(v=>{ if(!valid.has(v)) selectedIndustries.delete(v); });
  buildMultiSelect('industryFilter', values, selectedIndustries, '全部细分行业', renderTable);
}
function setupClassificationFilters(){
  const sectors = [...new Set(allStocks.map(s=>s.sector_cn||s.sector).filter(Boolean))];
  buildMultiSelect('sectorFilter', sectors, selectedSectors, '全部板块', ()=>{
    updateIndustryOptions(); renderTable();
  });
  updateIndustryOptions();
}

document.addEventListener('click', e=>{
  document.querySelectorAll('.multi-select').forEach(root=>{
    if(!root.contains(e.target)) root.classList.remove('open');
  });
});
document.querySelectorAll('.multi-select-btn').forEach(button=>{
  button.addEventListener('click', e=>{
    e.stopPropagation();
    const root = button.closest('.multi-select');
    document.querySelectorAll('.multi-select').forEach(other=>{ if(other!==root) other.classList.remove('open'); });
    root.classList.toggle('open');
  });
});

async function load(){
  try{
    const res = await fetch('/cache_stock.json', {cache:'no-store'});
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      document.getElementById('errbox').textContent = err.error || `加载失败: HTTP ${res.status}`;
      return;
    }
    const data = await res.json();
    allStocks = data.stocks || [];
    setupClassificationFilters();
    document.getElementById('generatedAt').textContent = data.generated_at || '--';
    renderTable();
  }catch(e){
    document.getElementById('errbox').textContent = '无法加载 /cache_stock.json: ' + e;
  }
}

function exportBrowserScreenshot(){
  // 和主看板index.html里的同一个思路:直接截取浏览器实际渲染出来的页面,
  // 不是服务器端重新渲染,所以看到的和你自己浏览器里看到的一致。
  if (typeof html2canvas === 'undefined') {
    alert('html2canvas库加载失败(可能是网络问题或者CDN被墙),请刷新页面重试。');
    return;
  }
  const target = document.querySelector('.page');
  html2canvas(target, {backgroundColor: '#0a0e12', useCORS: true, scale: window.devicePixelRatio || 1})
    .then(function(canvas){
      canvas.toBlob(function(blob){
        if (!blob) { alert('生成图片失败,可能是表格太长超过了浏览器canvas的尺寸上限。'); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `stock500_snapshot_${new Date().toISOString().slice(0,10)}.png`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/png');
    })
    .catch(function(err){ alert('截图失败: ' + err); });
}

function _triggerDownload(content, filename, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadJSON(){
  if(!allStocks.length){ alert('数据还没加载完成'); return; }
  _triggerDownload(JSON.stringify({generated_at: document.getElementById('generatedAt').textContent, stocks: allStocks}, null, 2),
                    `stock500_${new Date().toISOString().slice(0,10)}.json`, 'application/json');
}

function downloadCSV(){
  if(!allStocks.length){ alert('数据还没加载完成'); return; }
  const cols = ['rank','symbol','chinese_name','name','sector','sector_cn','industry','industry_cn','market_cap','price','ath','ath_date','ath_drawdown_pct',
                'pe_ratio','pb_ratio','ps_ratio','beta','free_cash_flow','financial_currency','roe','shares_outstanding',
                'debt_to_equity','change_pct','revenue','dividend_rate','dividend_yield_pct',
                'ipo_date','ipo_price','ipo_cagr_pct'];
  const header = cols.join(',');
  const lines = allStocks.map(s => cols.map(c=>{
    let v = s[c];
    if(v===null||v===undefined) return '';
    if(typeof v === 'string' && v.includes(',')) return `"${v.replace(/"/g,'""')}"`;
    return v;
  }).join(','));
  _triggerDownload([header, ...lines].join('\n'), `stock500_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
}

load();
</script>
</body>
</html>
